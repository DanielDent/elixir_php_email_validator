version: 2
updates:
  # Keep the GitHub Actions we pin to major tags current (and patched).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Wait before proposing an update, so a malicious release has time to be
    # caught and yanked by the community. Security updates for known CVEs
    # bypass this cooldown, so vulnerability fixes still arrive immediately.
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      actions:
        patterns: ["*"]

  # The dev/test toolchain (ex_doc, credo, dialyxir). No runtime deps to bump.
  - package-ecosystem: mix
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      dev-deps:
        patterns: ["*"]
