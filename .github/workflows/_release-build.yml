name: Release build + attest (reusable)

# Reusable workflow: builds the Hex tarball, records its SLSA Build L3 provenance
# attestation on its own isolated, ephemeral runner VM (the caller's steps can't
# reach the Sigstore signing identity), and uploads THAT EXACT tarball as an
# artifact. It holds NO Hex credential and declares NO environment — the publish key
# never enters this VM.
#
# The publish job (release-please.yml) downloads this artifact, re-verifies it
# against the attestation, and POSTs those exact bytes to Hex — so the published
# package is, by construction, the attested package (no rebuild, no "should be
# identical" assumption). `mix hex.publish` is deliberately NOT used for the package:
# it always rebuilds the tarball in memory and can't upload a prebuilt file.

on:
  workflow_call:

permissions: {}

jobs:
  build-attest:
    name: Build the tarball and attest its provenance (SLSA L3)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # keyless Sigstore OIDC for the attestation
      attestations: write # record the build-provenance attestation
    steps:
      # Actions SHA-pinned (Dependabot keeps these current on a cooldown).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.get
      # Gate: the inline `publish` job `needs:` this job, so a failing test here
      # blocks the publish — never ship a version that fails the golden regression.
      - run: mix test
      - name: Build the Hex tarball
        run: mix hex.build
      # Attest the exact tarball bytes. Signer identity is THIS workflow's path, so
      # consumers verify with --signer-workflow .../_release-build.yml.
      - name: Attest build provenance for the tarball
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "elixir_php_email_validator-*.tar"
      # Hand the EXACT attested tarball to the publish job (which re-verifies it
      # against the attestation before uploading those bytes to Hex).
      - name: Upload the attested tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hex-tarball
          path: elixir_php_email_validator-*.tar
          if-no-files-found: error
          retention-days: 1
