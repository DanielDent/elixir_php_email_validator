name: Release build + attest (reusable)

# Reusable workflow (KEYLESS): builds the package tarball AND the docs tarball,
# attests BOTH with actions/attest-build-provenance (SLSA Build L3, keyless Sigstore),
# and attaches BOTH to the GitHub Release as durable assets. It holds NO Hex
# credential and declares NO environment — the publish key never enters this VM.
#
# The GitHub Release is the durable artifact store: the inline `publish` job
# downloads these exact attested assets, re-verifies the COMPLETE set, and POSTs the
# exact bytes to Hex (no rebuild). `mix hex.publish` is not used — it always rebuilds
# the tarball in memory and can't ship a prebuilt file.
#
# The package tarball is byte-reproducible. The docs tarball is NOT (ex_doc embeds
# version/build details), but we attest and ship the EXACT bytes, so reproducibility
# is irrelevant to the guarantee — only the package needs to be reproducible.

on:
  workflow_call:

permissions: {}

jobs:
  build-attest:
    name: Build + attest package and docs (SLSA L3)
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach assets to the GitHub Release (NO Hex key in this VM)
      id-token: write # keyless Sigstore OIDC for the attestations
      attestations: write # record the build-provenance attestations
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.get
      # Gate: the `publish` job `needs:` this job, so a failing test blocks publish.
      - run: mix test
      - name: Build the package tarball (byte-reproducible) and resolve the tag
        id: build
        run: |
          set -euo pipefail
          mix hex.build
          shopt -s nullglob
          pkgs=(elixir_php_email_validator-*.tar)
          [ "${#pkgs[@]}" -eq 1 ] || { echo "::error::expected exactly one package tarball, found ${#pkgs[@]}"; exit 1; }
          pkg="${pkgs[0]}"
          version="${pkg#elixir_php_email_validator-}"; version="${version%.tar}"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "built $pkg (version $version)"
      - name: Build the docs tarball
        id: docs
        run: |
          set -euo pipefail
          mix docs
          docs="docs-${{ steps.build.outputs.tag }}.tar.gz"
          # Hex's docs endpoint unpacks the HTML; any gzipped tar of doc/ is accepted.
          tar -czf "$docs" -C doc .
          test -s "$docs"
          echo "docs=$docs" >> "$GITHUB_OUTPUT"
      - name: Build the source archive (byte-reproducible)
        id: source
        run: |
          set -euo pipefail
          src="source-${{ steps.build.outputs.tag }}.tar.gz"
          # Archive the exact build commit's tree (the commit the provenance binds).
          # --format=tar | gzip -n keeps it byte-reproducible (no embedded gzip mtime),
          # so anyone can re-derive it from the tag/commit and check the attested digest.
          git archive --format=tar --prefix="elixir_php_email_validator-${{ steps.build.outputs.version }}/" HEAD \
            | gzip -n -9 > "$src"
          test -s "$src"
          echo "src=$src" >> "$GITHUB_OUTPUT"
      # Attest all THREE tarballs — each binds its SHA-256 to repo/commit/this workflow,
      # tying package + docs + source to one build. Signer identity is THIS workflow's
      # path, so consumers verify with --signer-workflow .../_release-build.yml.
      - name: Attest build provenance (package + docs + source)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ steps.build.outputs.pkg }}
            ${{ steps.docs.outputs.docs }}
            ${{ steps.source.outputs.src }}
      # Attach BOTH attested tarballs to the GitHub Release (the durable store the
      # publish job pulls from). --clobber makes a re-run / dispatch idempotent.
      - name: Attach the attested tarballs to the draft Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.build.outputs.tag }}"
          # release-please creates the Release as a DRAFT (mutable). We attach the
          # attested assets here but do NOT publish it — the inline `publish` job
          # verifies the whole set + publishes to Hex first, then flips the Release to
          # published (GitHub locks it immutable with the assets baked in). On a
          # workflow_dispatch for a fresh tag, create the draft (--verify-tag fails
          # loudly if the git tag is missing). If the Release is already published
          # (immutable) from a prior successful run, its assets are locked in — skip.
          if gh release view "$tag" >/dev/null 2>&1; then
            if [ "$(gh release view "$tag" --json isDraft --jq .isDraft)" != "true" ]; then
              echo "Release $tag already published (immutable) — assets locked in; skipping attach"
              exit 0
            fi
          else
            gh release create "$tag" --draft --verify-tag --title "$tag" --notes "Release ${tag}"
          fi
          gh release upload "$tag" \
            "${{ steps.build.outputs.pkg }}" \
            "${{ steps.docs.outputs.docs }}" \
            "${{ steps.source.outputs.src }}" \
            --clobber
