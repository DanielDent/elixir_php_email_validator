name: Release

# Fully automated, atomic-as-possible, idempotent release pipeline:
#   1. release-please watches `main` for Conventional Commits and maintains a
#      "release PR" that bumps the version (mix.exs) and updates CHANGELOG.
#   2. Merging it tags vX.Y.Z and creates the GitHub Release (the durable store).
#   3. `provenance` (the keyless `_release-build.yml` reusable workflow) builds +
#      attests the package AND docs tarballs (SLSA Build L3) and ATTACHES both to the
#      Release.
#   4. `publish` (the only job with the Hex key, in the protected `hex-publish`
#      environment) downloads those exact attested assets from the Release, VERIFIES
#      THE COMPLETE SET against its attestation (fully-attested-set-or-nothing — if
#      either is missing/unverified it publishes NOTHING), then POSTs the exact bytes
#      to Hex: the package idempotently (skip if already published with matching
#      checksum; hard-fail on divergent bytes) and the docs (Hex overwrites freely).
#      Both are REQUIRED — a partial write fails the job loudly; the publish pulls
#      from the durable Release, so a retry (Re-run failed jobs, or workflow_dispatch)
#      converges without rebuilding.
#
# Credential isolation: HEX_API_KEY lives ONLY in the inline `publish` job (the
# `hex-publish` environment, gated to `main`), never enters the build/attest VM, and
# the publish job runs NO dependency code (no mix/ex_doc) beside the key — just
# gh + curl. Build + attest run in a separate isolated VM, which is what makes the
# provenance SLSA Build L3.
#
# Honest boundary: Hex's package POST and docs POST are two non-transactional calls,
# so this is "as atomic as possible" (gate before any write + idempotent convergence
# on retry), NOT a two-phase commit.
#
# NOTE: provenance + publish MUST share the run with release-please — a tag created
# by GITHUB_TOKEN does not trigger a separate `on: release`/`push: tags` workflow.

on:
  push:
    branches: [main]
  workflow_dispatch: # manual escape hatch / idempotent retry: (re)publish main's version

# Default-deny; each job declares exactly what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR / cut release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # SHA-pinned: this job has `contents: write` and creates the tag/commit a
      # release is built from, so a moved tag must not be able to swap in code.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build + attest the package AND docs tarballs and attach both to the Release, on
  # an isolated, keyless VM (SLSA Build L3). No Hex credential here.
  provenance:
    name: Build + attest (SLSA L3)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/_release-build.yml
    permissions:
      contents: write
      id-token: write
      attestations: write

  # Publish the EXACT attested bytes to Hex. The only job with the Hex key; runs no
  # dependency code beside it (gh + curl only). Idempotent + fail-closed.
  publish:
    name: Publish to Hex.pm
    needs: [release-please, provenance]
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: hex-publish
      url: https://hex.pm/packages/elixir_php_email_validator
    permissions:
      contents: write # download from the Release, flip it to published + reap orphan draft duplicates at the end
      attestations: read # gh attestation verify
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve version + download the attested assets from the Release
        id: assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version=$(grep -E '^[[:space:]]*@version[[:space:]]+"' mix.exs | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || true)
          [ -n "$version" ] || { echo "::error::could not read @version from mix.exs"; exit 1; }
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          mkdir -p assets
          gh release download "$tag" --dir assets \
            --pattern 'elixir_php_email_validator-*.tar' \
            --pattern 'docs-*.tar.gz' \
            --pattern 'source-*.tar.gz'
          shopt -s nullglob
          pkgs=(assets/elixir_php_email_validator-*.tar); docs=(assets/docs-*.tar.gz); srcs=(assets/source-*.tar.gz)
          [ "${#pkgs[@]}" -eq 1 ] || { echo "::error::expected exactly one package asset on $tag, found ${#pkgs[@]}"; exit 1; }
          [ "${#docs[@]}" -eq 1 ] || { echo "::error::expected exactly one docs asset on $tag, found ${#docs[@]}"; exit 1; }
          [ "${#srcs[@]}" -eq 1 ] || { echo "::error::expected exactly one source asset on $tag, found ${#srcs[@]}"; exit 1; }
          echo "pkg=${pkgs[0]}" >> "$GITHUB_OUTPUT"
          echo "docs=${docs[0]}" >> "$GITHUB_OUTPUT"
          echo "src=${srcs[0]}" >> "$GITHUB_OUTPUT"
          echo "resolved $tag: ${pkgs[0]} + ${docs[0]} + ${srcs[0]}"
      # GATE (fully-attested-set-or-nothing): the COMPLETE set must verify against its
      # attestation before ANY Hex write. Any missing/unverified asset => publish nothing.
      - name: Gate — verify the complete attested set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for f in "${{ steps.assets.outputs.pkg }}" "${{ steps.assets.outputs.docs }}" "${{ steps.assets.outputs.src }}"; do
            ok=false
            for i in 1 2 3 4 5 6; do
              if gh attestation verify "$f" \
                   --repo DanielDent/elixir_php_email_validator \
                   --signer-workflow DanielDent/elixir_php_email_validator/.github/workflows/_release-build.yml; then
                ok=true; break
              fi
              echo "attestation for $f not available yet (attempt $i); waiting…"; [ "$i" = 6 ] || sleep 10
            done
            [ "$ok" = "true" ] || { echo "::error::attestation verification FAILED for $f — aborting, publishing NOTHING"; exit 1; }
          done
          echo "complete attested set verified — proceeding to publish"
      # Probe Hex for this version with an UNAUTHENTICATED GET (NO key in this step).
      # The package tarball is byte-reproducible, so its sha256 == Hex's stored
      # checksum (outer_checksum) — that equality is the load-bearing idempotency
      # invariant. Transient 5xx/000 are retried; a real 200/404 is terminal.
      - name: Check whether the version is already on Hex
        id: hexcheck
        run: |
          set -euo pipefail
          version="${{ steps.assets.outputs.version }}"
          pkg="${{ steps.assets.outputs.pkg }}"
          sha=$(shasum -a 256 "$pkg" | cut -d' ' -f1)
          code="000"
          for i in 1 2 3; do
            code=$(curl -sS -o rel.json -w '%{http_code}' \
              "https://hex.pm/api/packages/elixir_php_email_validator/releases/${version}" || echo "000")
            case "${code}" in 200|404) break ;; esac
            echo "transient Hex GET response (${code}); retry ${i}…"; sleep 5
          done
          echo "GET release ${version} -> HTTP ${code}"
          case "${code}" in
            404)
              echo "state=absent" >> "$GITHUB_OUTPUT"
              echo "not on Hex yet — will POST the exact attested tarball"
              ;;
            200)
              published=$(jq -r '.checksum // ""' rel.json)
              if [ "${published}" = "${sha}" ]; then
                echo "state=present" >> "$GITHUB_OUTPUT"
                echo "package ${version} already on Hex with matching checksum — POST will be skipped (idempotent)"
              else
                echo "::error::version ${version} already published with DIFFERENT bytes (published=${published}, attested=${sha}) — refusing to overwrite"; exit 1
              fi
              ;;
            *)
              echo "::error::Hex GET for ${version} failed (HTTP ${code})"; cat rel.json; echo; exit 1
              ;;
          esac
      # POST the EXACT attested package bytes — ONLY if absent. The key touches only
      # this step (and the docs step). We never use Hex's ?replace (no 1h edit window).
      - name: Publish package (idempotent)
        if: ${{ steps.hexcheck.outputs.state == 'absent' }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          set -euo pipefail
          pkg="${{ steps.assets.outputs.pkg }}"
          version="${{ steps.assets.outputs.version }}"
          pcode=$(curl -sS -o presp.txt -w '%{http_code}' -X POST \
            "https://hex.pm/api/packages/elixir_php_email_validator/releases" \
            -H "authorization: ${HEX_API_KEY}" \
            -H "content-type: application/octet-stream" \
            --data-binary "@${pkg}")
          echo "package POST -> HTTP ${pcode}"
          case "${pcode}" in 200|201) echo "package ${version} published";; *) echo "::error::package publish failed (HTTP ${pcode})"; cat presp.txt; echo; exit 1;; esac
      # Docs are freely overwritable on Hex (inherently idempotent). REQUIRED — a docs
      # failure fails the job (no continue-on-error); a retry converges.
      - name: Publish docs (idempotent)
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          set -euo pipefail
          docs="${{ steps.assets.outputs.docs }}"
          version="${{ steps.assets.outputs.version }}"
          dcode=$(curl -sS -o dresp.txt -w '%{http_code}' -X POST \
            "https://hex.pm/api/packages/elixir_php_email_validator/releases/${version}/docs" \
            -H "authorization: ${HEX_API_KEY}" \
            -H "content-type: application/octet-stream" \
            --data-binary "@${docs}")
          echo "docs POST -> HTTP ${dcode}"
          case "${dcode}" in 200|201) echo "docs for ${version} published";; *) echo "::error::docs publish failed (HTTP ${dcode})"; cat dresp.txt; echo; exit 1;; esac
      # Publish the Release LAST (only after the whole attested set verified AND both
      # Hex POSTs succeeded), then CONVERGE the tag to EXACTLY ONE release: published,
      # attested assets baked in, and any leftover DRAFT duplicates reaped.
      #
      # GitHub permits multiple releases to carry one tag as long as the extras are
      # DRAFTS — a release-please re-cut creates exactly such an orphan. The old code
      # flipped via `gh release view/edit <tag>`, but gh resolves an ambiguous tag to
      # the PUBLISHED release, so it no-op'd and left the orphan draft behind. We
      # instead enumerate every release for the tag via the REST API (which lists
      # drafts too — this job has contents:write) and act on integer release IDs, which
      # is unambiguous. REST uses the boolean `.draft` (gh --json uses `isDraft`).
      # Uses only GH_TOKEN — never the Hex key. Idempotent + fail-closed + convergent.
      - name: Publish the Release + reap orphan draft duplicates (immutable)
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER_REPO: ${{ github.repository }}
          TAG: v${{ steps.assets.outputs.version }}
        run: |
          set -euo pipefail

          # List every release carrying this tag, with retry: a transient list failure
          # here would otherwise fail the run AFTER Hex already has the bytes (a re-run /
          # workflow_dispatch converges anyway, but a spurious red run is noise). With
          # --paginate (no --slurp) gh emits one JSON array per page; `jq '.[]'` streams
          # across them, so this is correct for one page or many.
          ok=false
          for i in 1 2 3; do
            if gh api "repos/${OWNER_REPO}/releases" --paginate > releases.json; then ok=true; break; fi
            echo "release list for ${TAG} failed (attempt $i); retrying…"; sleep 5
          done
          [ "$ok" = "true" ] || { echo "::error::could not list releases for ${TAG}"; exit 1; }

          # Partition into published vs draft IDs. Built in THIS shell via process
          # substitution (a pipe would build the arrays in a subshell and lose them
          # under set -euo pipefail). `.id` is a number, `.draft` a boolean -> @tsv.
          pub_ids=(); draft_ids=()
          while IFS=$'\t' read -r id draft; do
            [ -n "$id" ] || continue
            if [ "$draft" = "true" ]; then draft_ids+=("$id"); else pub_ids+=("$id"); fi
          done < <(jq -r --arg t "$TAG" '.[] | select(.tag_name == $t) | [.id, .draft] | @tsv' releases.json)

          echo "tag ${TAG}: ${#pub_ids[@]} published, ${#draft_ids[@]} draft(s)"

          # Fail-closed: the gate + asset download already ran against this tag, so a
          # release MUST exist. Zero = torn state -> red run, never a silent pass.
          if [ "${#pub_ids[@]}" -eq 0 ] && [ "${#draft_ids[@]}" -eq 0 ]; then
            echo "::error::no release found for ${TAG} — aborting"; exit 1
          fi

          # INVARIANT: at most one PUBLISHED release per tag. Two means a state we must
          # NOT auto-resolve (published releases are immutable; deleting one is
          # forbidden) — fail loudly for a human rather than guess.
          if [ "${#pub_ids[@]}" -gt 1 ]; then
            echo "::error::found ${#pub_ids[@]} PUBLISHED releases for ${TAG} (${pub_ids[*]}) — refusing to modify any; manual review"; exit 1
          fi

          if [ "${#pub_ids[@]}" -eq 1 ]; then
            # Already published (a prior successful run, or a re-run / dispatch). Keep it
            # exactly as-is; just garbage-collect any orphan drafts. Convergent no-op
            # when there are none. This is the path that fixes the observed incident.
            keep="${pub_ids[0]}"
            echo "Release ${TAG} already published (id ${keep}) — reaping ${#draft_ids[@]} orphan draft(s)"
          else
            # Not yet published. `concurrency: release-<ref>` (cancel-in-progress:false)
            # serializes runs on this ref, so exactly one draft exists here: the one
            # `provenance` attached the verified set to. Promote it BY ID (no ambiguous
            # tag resolution). >1 draft with none published is an unexpected, unserialized
            # state — fail rather than guess which one carries the attested set.
            if [ "${#draft_ids[@]}" -ne 1 ]; then
              echo "::error::expected exactly one draft for unpublished ${TAG}, found ${#draft_ids[@]} (${draft_ids[*]:-}) — refusing to guess; manual review"; exit 1
            fi
            keep="${draft_ids[0]}"
            gh api -X PATCH "repos/${OWNER_REPO}/releases/${keep}" -F draft=false >/dev/null
            echo "published Release ${TAG} (id ${keep}; now immutable, attested assets baked in)"
          fi

          # Reap every OTHER draft on this tag (re-cut orphans). Tolerate an already-gone
          # draft (a concurrent reap / manual delete) so a transient 404 can't wedge the
          # run; but if a delete fails AND the draft still exists, fail loudly — a green
          # run must mean EXACTLY ONE release for the tag. Never touches `keep` (even if
          # `keep` started as a draft and was just promoted), so it can never be deleted.
          for id in "${draft_ids[@]:-}"; do
            [ -n "$id" ] || continue
            [ "$id" = "$keep" ] && continue
            if gh api -X DELETE "repos/${OWNER_REPO}/releases/${id}" >/dev/null 2>&1; then
              echo "reaped orphan draft release ${id} for ${TAG}"
            else
              # Only tolerate "already gone" (404). Any other failure means we can't
              # guarantee convergence to exactly one release.
              status=$(gh api -i "repos/${OWNER_REPO}/releases/${id}" 2>/dev/null | head -n1 | awk '{print $2}' || true)
              if [ "$status" = "404" ]; then
                echo "orphan draft ${id} already gone — ok"
              else
                echo "::error::failed to delete orphan draft ${id} for ${TAG} (GET status ${status:-unknown}) — aborting"; exit 1
              fi
            fi
          done

  # Escalate a failed release loudly (the project's norm: human-actionable failures
  # open a tracking issue) — a red run alone is too easy to miss.
  notify-failure:
    name: Escalate a failed release
    needs: [release-please, provenance, publish]
    if: ${{ failure() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' || needs.release-please.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="Release pipeline failed"
          body="A release run failed (build / attest / gate / publish). The package and/or docs may be absent from Hex, or only partially published. The publish is idempotent — re-run the Release workflow via workflow_dispatch and it converges (already-published-with-matching-bytes is treated as success; divergent bytes hard-fail). Investigate: ${RUN_URL}"
          num=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue comment "$num" --body "Still failing (re-checked). $body"
          else
            gh issue create --title "$title" --body "$body"
          fi
