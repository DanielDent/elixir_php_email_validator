name: Release

# Fully automated release pipeline:
#   1. release-please watches `main` for Conventional Commits and maintains an
#      open "release PR" that bumps the version (mix.exs) and updates CHANGELOG.
#   2. When you merge that PR, release-please tags + creates a GitHub Release.
#   3. The `publish` job then calls the `_release-build.yml` reusable workflow,
#      which builds + attests + publishes that version to Hex.pm.
#
# The build/publish runs in the protected `hex-publish` GitHub Environment (declared
# inside the reusable workflow), so the Hex credential is never exposed to pull
# requests, forks, or logs, and only the real release path can use it. Running it in
# a reusable workflow isolates the Sigstore signing identity from the build steps —
# that is what makes the provenance SLSA Build L3. See RELEASING.md and
# _release-build.yml.
#
# NOTE: the publish job and release-please MUST live in the same workflow run.
# release-please creates the tag/release with GITHUB_TOKEN, and events raised by
# GITHUB_TOKEN do not trigger separate `on: release`/`on: push: tags` workflows.

on:
  push:
    branches: [main]
  workflow_dispatch: # manual escape hatch: publish whatever version is on main

# Default-deny; each job declares exactly what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR / cut release
    runs-on: ubuntu-latest
    # The action's documented permission set.
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # SHA-pinned: this job has `contents: write` and creates the tag/commit a
      # release is built from, so a moved tag must not be able to swap in code.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          # Uses release-please-config.json + .release-please-manifest.json.
          # GITHUB_TOKEN is sufficient — no personal token required.
          token: ${{ secrets.GITHUB_TOKEN }}

  # The build + attest + publish runs in the `_release-build.yml` REUSABLE workflow
  # so it executes on its own isolated, ephemeral runner VM the caller's steps can't
  # reach — that isolation of the Sigstore signing identity from the build steps is
  # what makes the attestation SLSA Build L3. A reusable workflow invoked here runs
  # inside this same release run, preserving the "publish shares the run with
  # release-please" requirement above.
  publish:
    name: Publish to Hex.pm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/_release-build.yml
    # The caller sets the token ceiling passed down to the reusable workflow (the
    # callee can only narrow these, never elevate). `environment:`/`runs-on:`/`steps:`
    # are not valid on a job that calls a reusable workflow — they live in the callee.
    permissions:
      contents: read
      id-token: write
      attestations: write
    # No `secrets:` — HEX_API_KEY is an environment secret of `hex-publish`,
    # resolved inside the reusable workflow by its job-level `environment:`.
