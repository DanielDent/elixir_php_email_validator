name: Release

# Fully automated release pipeline:
#   1. release-please watches `main` for Conventional Commits and maintains an
#      open "release PR" that bumps the version (mix.exs) and updates CHANGELOG.
#   2. When you merge that PR, release-please tags + creates a GitHub Release.
#   3. The `provenance` job (the `_release-build.yml` reusable workflow) builds the
#      tarball and attests it (SLSA Build L3); the `publish` job then pushes it to Hex.
#
# Credential isolation: `mix hex.publish` runs in the inline `publish` job, the ONLY
# job that declares the protected `hex-publish` GitHub Environment, so HEX_API_KEY is
# never exposed to pull requests, forks, or logs, never enters the build/attest VM,
# and the key is scoped to just the publish step. Build + attest run in the reusable
# workflow on a separate isolated VM, which keeps the Sigstore signing identity off
# the build steps — that is what makes the provenance SLSA Build L3. The key is NOT
# passed to the reusable workflow (no `secrets: inherit`), so it stays out of that
# VM. See RELEASING.md and _release-build.yml.
#
# NOTE: the provenance + publish jobs and release-please MUST live in the same run.
# release-please creates the tag/release with GITHUB_TOKEN, and events raised by
# GITHUB_TOKEN do not trigger separate `on: release`/`on: push: tags` workflows.

on:
  push:
    branches: [main]
  workflow_dispatch: # manual escape hatch: publish whatever version is on main

# Default-deny; each job declares exactly what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR / cut release
    runs-on: ubuntu-latest
    # The action's documented permission set.
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # SHA-pinned: this job has `contents: write` and creates the tag/commit a
      # release is built from, so a moved tag must not be able to swap in code.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          # Uses release-please-config.json + .release-please-manifest.json.
          # GITHUB_TOKEN is sufficient — no personal token required.
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build + attest run in the `_release-build.yml` REUSABLE workflow, on its own
  # isolated, ephemeral runner VM the caller's steps can't reach — that isolation of
  # the Sigstore signing identity from the build steps is what makes the attestation
  # SLSA Build L3. It holds NO Hex credential. A reusable workflow invoked here runs
  # inside this same release run, preserving the "shares the run with release-please"
  # requirement above. No `secrets:` are passed, so the key stays out of this VM.
  provenance:
    name: Build + attest (SLSA L3)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/_release-build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write

  # Publishing runs in a normal INLINE job that declares the `hex-publish`
  # environment, so the HEX_API_KEY environment secret resolves here (it does NOT
  # resolve inside a reusable workflow unless the caller forwards it — which we avoid
  # to keep the key out of the build/attest VM). `needs: provenance` makes a failed
  # attestation block the publish (fail-closed). The package published is the EXACT
  # attested tarball: we download the artifact, re-verify it against its attestation,
  # then POST those bytes straight to Hex's API — NOT `mix hex.publish`, which always
  # rebuilds the tarball in memory. Docs are separate and unattested.
  publish:
    name: Publish to Hex.pm
    needs: [release-please, provenance]
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: hex-publish
      url: https://hex.pm/packages/elixir_php_email_validator
    permissions:
      contents: read
      attestations: read # for `gh attestation verify` below
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - name: Download the attested tarball
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: hex-tarball
      # Re-verify the downloaded bytes ARE the attested bytes — GitHub artifacts are
      # not content-addressed, so this closes the swap gap and makes "published ==
      # attested" end-to-end. Retry for the brief propagation of an attestation just
      # created in this same run.
      - name: Verify the tarball against its provenance attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tar=$(ls elixir_php_email_validator-*.tar)
          for i in 1 2 3 4 5 6; do
            if gh attestation verify "$tar" \
                 --repo DanielDent/elixir_php_email_validator \
                 --signer-workflow DanielDent/elixir_php_email_validator/.github/workflows/_release-build.yml; then
              echo "provenance verified for $tar"; exit 0
            fi
            echo "attestation not available yet (attempt $i); waiting…"; sleep 10
          done
          echo "::error::could not verify $tar against its attestation"; exit 1
      # Publish the EXACT attested bytes — no rebuild. `authorization` is the raw key
      # (no Bearer prefix); Hex derives the registry checksum from these bytes, so the
      # published package == the attested package by construction.
      - name: Publish the exact tarball to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          set -euo pipefail
          tar=$(ls elixir_php_email_validator-*.tar)
          code=$(curl -sS -o resp.txt -w '%{http_code}' \
            -X POST "https://hex.pm/api/packages/elixir_php_email_validator/releases" \
            -H "authorization: ${HEX_API_KEY}" \
            -H "content-type: application/octet-stream" \
            --data-binary "@${tar}")
          echo "HTTP ${code}"; cat resp.txt; echo
          case "${code}" in 200|201) echo "published ${tar}";; *) echo "::error::Hex publish failed (HTTP ${code})"; exit 1;; esac
      # Docs are a separate, unattested tarball (a different Hex endpoint) — build and
      # publish them on their own. This is the only step that runs dependency code
      # (ex_doc) beside the key; the package upload above runs none.
      - run: mix deps.get
      - name: Publish docs to HexDocs
        # Best-effort: the attested package is already published above, so a docs
        # hiccup must not fail the release (re-run `mix hex.publish docs` by hand).
        continue-on-error: true
        env:
          # When Hex.pm OIDC trusted publishing ships, delete this secret + the env
          # lines and add `id-token: write` to this job's permissions — see RELEASING.md.
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish docs --yes
